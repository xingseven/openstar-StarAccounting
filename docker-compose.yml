version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: xfdashboard-db
    environment:
      POSTGRES_USER: xfdashboard
      POSTGRES_PASSWORD: password
      POSTGRES_DB: xfdashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
