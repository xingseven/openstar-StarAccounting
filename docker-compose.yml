version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: openstar-StarAccounting-db
    environment:
      MYSQL_ROOT_PASSWORD: Admin123.
      MYSQL_DATABASE: xf_dashboard
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    container_name: openstar-StarAccounting-server
    environment:
      DATABASE_URL: "mysql://root:Admin123.@mysql:3306/xf_dashboard"
      PORT: 3006
      PUBLIC_IP: "0.0.0.0"
      JWT_SECRET: "dev-secret"
      ALLOW_DEV_HEADERS: 1
    ports:
      - "3006:3006"
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ./web
    container_name: openstar-StarAccounting-web
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:3006"
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: openstar-StarAccounting-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      web:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
