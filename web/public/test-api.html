<!DOCTYPE html>
<html>
<head>
  <title>测试交易 API</title>
</head>
<body>
  <h1>交易 API 测试</h1>
  <button onclick="testAPI()">测试获取交易</button>
  <button onclick="testCreate()">测试创建交易</button>
  <pre id="result"></pre>

  <script>
    const API_BASE = window.location.origin;
    let token = null;

    async function login() {
      const res = await fetch(`${API_BASE}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: 'admin@openstar-StarAccounting.com',
          password: 'Admin123.'
        })
      });
      const data = await res.json();
      if (data.data?.token) {
        token = data.data.token;
        console.log('✓ 登录成功，token:', token);
        return true;
      }
      console.error('✗ 登录失败:', data);
      return false;
    }

    async function testAPI() {
      if (!token && !await login()) return;

      try {
        const res = await fetch(`${API_BASE}/api/transactions?pageSize=100`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        
        const output = document.getElementById('result');
        output.textContent = JSON.stringify(data, null, 2);

        if (data.data?.items && data.data.items.length > 0) {
          console.log('✓ 获取成功，共', data.data.items.length, '条记录');
          
          // 测试过滤
          const savingsKeywords = ["储蓄", "存款", "理财", "基金", "股票", "定投", "Savings", "Deposit"];
          const filtered = data.data.items.filter(t => 
            savingsKeywords.some(k => 
              t.category.includes(k) || 
              (t.description && t.description.includes(k))
            )
          );
          console.log('✓ 过滤后:', filtered.length, '条储蓄相关记录');
          console.log('过滤结果:', filtered);
        } else {
          console.log('⚠ 没有交易记录');
        }
      } catch (e) {
        console.error('✗ 测试失败:', e);
        document.getElementById('result').textContent = e.message;
      }
    }

    async function testCreate() {
      if (!token && !await login()) return;

      try {
        const res = await fetch(`${API_BASE}/api/transactions`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({
            amount: '500',
            type: 'EXPENSE',
            category: '储蓄取款',
            platform: '测试',
            merchant: '测试目标',
            date: new Date().toISOString(),
            description: 'API 测试取款'
          })
        });
        const data = await res.json();
        document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        
        if (data.data?.item) {
          console.log('✓ 创建成功');
        } else {
          console.error('✗ 创建失败:', data);
        }
      } catch (e) {
        console.error('✗ 测试失败:', e);
        document.getElementById('result').textContent = e.message;
      }
    }
  </script>
</body>
</html>
